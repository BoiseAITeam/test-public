const DB = {
  get: t => JSON.parse(localStorage.getItem('it_' + t) || '[]'),
  set: (t, d) => localStorage.setItem('it_' + t, JSON.stringify(d)),
  nextId: t => { const r = DB.get(t); return r.length ? Math.max(...r.map(x => x.id)) + 1 : 1; },
  insert: (t, item) => {
    const rows = DB.get(t);
    const id = DB.nextId(t);
    const now = new Date().toISOString();
    const rec = { id, created_at: now, updated_at: now, ...item };
    rows.push(rec); DB.set(t, rows); return rec;
  },
  update: (t, id, updates) => {
    const rows = DB.get(t);
    const i = rows.findIndex(r => r.id === id);
    if (i < 0) return null;
    rows[i] = { ...rows[i], ...updates, updated_at: new Date().toISOString() };
    DB.set(t, rows); return rows[i];
  },
  delete: (t, id) => DB.set(t, DB.get(t).filter(r => r.id !== id)),
  find: (t, fn) => DB.get(t).filter(fn),
  one: (t, fn) => DB.get(t).find(fn),

};

// ==================== HELPERS ====================
function daysUntil(d) { if (!d) return null; return Math.ceil((new Date(d+' 12:00') - new Date()) / 86400000); }
function fmtDate(d) { if (!d) return '—'; return new Date(d+' 12:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function fmtDT(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' + new Date(d).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}); }
function maskTax(id) { return id ? id.replace(/\d(?=\d{4})/g,'*') : '—'; }
function computeStatus(subId) {
  const sub = DB.one('subs', s => s.id === subId);
  if (!sub) return 'pending';
  if (!sub.w9_on_file) return 'pending';
  const policies = DB.find('policies', p => p.sub_id === subId);
  if (policies.length === 0) return 'non_compliant';
  if (policies.some(p => p.status === 'expired' || daysUntil(p.expiration_date) < 0)) return 'non_compliant';
  if (policies.some(p => { const d = daysUntil(p.expiration_date); return d !== null && d <= 30 && d >= 0; })) return 'expiring_soon';
  return 'active';
}
function statusBadge(s) {
  return {active:'<span class="badge-active"><i class="bi bi-check-circle me-1"></i>Compliant</span>',expiring_soon:'<span class="badge-expiring"><i class="bi bi-exclamation-triangle me-1"></i>Expiring Soon</span>',non_compliant:'<span class="badge-noncompliant"><i class="bi bi-x-circle me-1"></i>Non-Compliant</span>',pending:'<span class="badge-pending"><i class="bi bi-clock me-1"></i>Pending</span>'}[s] || `<span class="badge-pending">${s}</span>`;
}
function policyBadge(policy, days) {
  if (!policy) return '<span class="policy-badge policy-missing"><i class="bi bi-dash-circle me-1"></i>Missing</span>';
  if (policy.status === 'expired' || (days !== null && days < 0)) return '<span class="policy-badge policy-bad"><i class="bi bi-x-circle me-1"></i>Expired</span>';
  if (days !== null && days <= 30) return `<span class="policy-badge policy-warn"><i class="bi bi-exclamation-triangle me-1"></i>${days}d left</span>`;
  return '<span class="policy-badge policy-ok"><i class="bi bi-check-circle me-1"></i>Active</span>';
}

let editingGCId = null;

// ==================== AUTH ====================
function login(email, password) {
  const user = DB.one('users', u => u.email.toLowerCase() === email.toLowerCase().trim() && u.password === password);
  if (!user) return null;
  let gcId = null;
  if (user.role === 'general_contractor') {
    const gc = DB.one('gcs', g => g.user_id === user.id);
    gcId = gc ? gc.id : null;
  }
  return { ...user, gcId };
}
function logout() {
  AUTH = { user: null };
  sessionStorage.removeItem('it_session');
  document.getElementById('app-wrapper').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
}

document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('login-password').addEventListener('keydown', e => { if(e.key === 'Enter') doLogin(); });
function doLogin() {
  const e = document.getElementById('login-email').value;
  const p = document.getElementById('login-password').value;
  const err = document.getElementById('login-error');
  err.classList.add('d-none');
  const user = login(e, p);
  if (!user) { err.textContent = 'Invalid email or password'; err.classList.remove('d-none'); return; }
  AUTH.user = user;
  sessionStorage.setItem('it_session', JSON.stringify(user));
  startApp();
}

// ==================== APP ====================
function startApp() {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('app-wrapper').style.display = 'flex';
  buildSidebar();
  document.getElementById('topbar-user').textContent = AUTH.user.name;
  document.getElementById('sidebar-user-info').innerHTML = `<div style="font-weight:600">${AUTH.user.name}</div><div style="font-size:.7rem;opacity:.7">${AUTH.user.role.replace(/_/g,' ')}</div>`;
  refreshNotifBadge();
  showPage('dashboard');
}

function buildSidebar() {

function setActive(page) { document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active')); document.getElementById('nav-'+page)?.classList.add('active'); }

function showPage(page) {
  currentPage = page;
  setActive(page);
  const titles = {dashboard:'Dashboard',subcontractors:'Subcontractors','general-contractors':'General Contractors','insurance-agents':'Insurance Agents',emails:'Email Log',templates:'Email Templates',reports:'Compliance Report',notifications:'Notifications'};
  document.getElementById('page-title').textContent = titles[page] || page;
  const area = document.getElementById('content-area');
  area.innerHTML = '<div class="d-flex justify-content-center py-5"><div class="spinner-border text-primary"></div></div>';
  setTimeout(() => {
    try {
      if (page === 'dashboard') renderDashboard();
      else if (page === 'subcontractors') renderSubcontractors();
      else if (page === 'general-contractors') renderGCs();
      else if (page === 'insurance-agents') renderAgents();
      else if (page === 'emails') renderEmails();
      else if (page === 'templates') renderTemplates();
      else if (page === 'reports') renderReports();
      else if (page === 'notifications') renderNotifications();
    } catch(e) { area.innerHTML = `<div class="alert alert-danger">Error: ${e.message}</div>`; console.error(e); }

}

function bar(label, val, total, color, bg) {
  const pct = total>0 ? Math.round(val/total*100) : 0;
  return `<div class="mb-3"><div class="d-flex justify-content-between mb-1"><span style="font-size:.8rem;font-weight:600">${label}</span><span style="font-size:.8rem;color:${color};font-weight:700">${val} (${pct}%)</span></div><div class="progress-bar-it"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div></div>`;
}

function renderSubcontractors() {
  const role = AUTH.user.role;

  } else { subs = DB.all('subs'); }

  const gcs = DB.all('gcs');
  window._subs = subs.map(s => {
    const policies = DB.find('policies', p => p.sub_id === s.id);
    const gl = policies.find(p => p.policy_type === 'general_liability');
    const wc = policies.find(p => p.policy_type === 'workers_comp');
    return { ...s, computed_status: computeStatus(s.id), gl_policy: gl||null, wc_policy: wc||null, gl_days: gl?daysUntil(gl.expiration_date):null, wc_days: wc?daysUntil(wc.expiration_date):null };
  });

  document.getElementById('content-area').innerHTML = `<div class="card-it">

  </div>`;
  filterSubs();
}

function filterSubs() {
  const search = (document.getElementById('subSearch')?.value||'').toLowerCase();
  const statusF = document.getElementById('statusFilterSel')?.value||'';
  const gcF = parseInt(document.getElementById('gcFilterSel')?.value||'0')||0;
  let subs = window._subs||[];
  if (gcF) {
    const links = DB.find('gc_subs', l => l.gc_id === gcF && l.is_active).map(l => l.sub_id);
    subs = subs.filter(s => links.includes(s.id));
  }
  if (search) subs = subs.filter(s => (s.company_name+s.contact_name+(s.trade||'')).toLowerCase().includes(search));
  if (statusF) subs = subs.filter(s => s.computed_status === statusF);
  const tbody = document.getElementById('subTbody');
  if (!tbody) return;
  if (!subs.length) { tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><i class="bi bi-search"></i>No subcontractors found</div></td></tr>'; return; }
  tbody.innerHTML = subs.map(s => `<tr class="sub-row" onclick="openSubDetail(${s.id})">
    <td><strong>${s.company_name}</strong><br><small class="text-muted">${s.contact_name}${s.is_sole_proprietor?' <span class="badge bg-secondary" style="font-size:.65rem">Sole Prop</span>':''}</small></td>
    <td>${s.trade||'—'}</td>
    <td>${statusBadge(s.computed_status)}</td>
    <td class="text-center">${s.w9_on_file?`<i class="bi bi-check-circle-fill text-success" title="W9 on file (${s.w9_year})"></i>`:'<i class="bi bi-exclamation-circle-fill text-warning" title="W9 missing"></i>'}</td>
    <td>${policyBadge(s.gl_policy,s.gl_days)}</td>
    <td>${policyBadge(s.wc_policy,s.wc_days)}</td>
    <td onclick="event.stopPropagation()"><div class="dropdown"><button class="btn btn-sm btn-outline-secondary py-0 px-2" data-bs-toggle="dropdown"><i class="bi bi-three-dots"></i></button><ul class="dropdown-menu dropdown-menu-end">

      ${AUTH.user.role==='admin'?`<li><a class="dropdown-item" href="#" onclick="openEditSub(${s.id})"><i class="bi bi-pencil me-2"></i>Edit</a></li><li><a class="dropdown-item" href="#" onclick="openEmailComposer(${s.id})"><i class="bi bi-envelope me-2"></i>Send Email</a></li>`:''}
    </ul></div></td>
  </tr>`).join('');
}

function renderPolicyCard(p, sub) {
  const days = p.days_remaining;

  const expiring = !expired&&days!==null&&days<=30;
  const border = expired?'#dc3545':expiring?'#fd7e14':'#198754';
  const label = {general_liability:'General Liability',workers_comp:"Workers' Compensation",auto:'Commercial Auto'}[p.policy_type]||p.policy_type;
  return `<div class="card mb-3" style="border-left:4px solid ${border}"><div class="card-body">
    <div class="d-flex justify-content-between align-items-start mb-2">
      <div><h6 class="mb-0">${label} ${p.is_ghost_policy?'<span class="badge bg-secondary">Ghost Policy</span>':''}</h6><small class="text-muted">${p.carrier||'Carrier unknown'} ${p.policy_number?'• '+p.policy_number:''}</small></div>

    </div>
    <div class="row g-2" style="font-size:.8rem">
      <div class="col-4"><div class="text-muted">Coverage</div><div class="fw-bold">${p.coverage_amount?'$'+p.coverage_amount.toLocaleString():'—'}</div></div>

      <div class="col-4"><div class="text-muted">Expires</div><div class="${expired?'text-danger fw-bold':expiring?'text-warning fw-bold':''}">${fmtDate(p.expiration_date)}</div></div>
      <div class="col-4"><div class="text-muted">Certificate</div><div>${p.certificate_on_file?'<i class="bi bi-check-circle text-success"></i> On file':'<i class="bi bi-x-circle text-danger"></i> Missing'}</div></div>
      <div class="col-4"><div class="text-muted">Addl. Insured</div><div>${p.requires_additional_insured?(p.additional_insured_confirmed?'<i class="bi bi-check-circle text-success"></i> Confirmed':'<i class="bi bi-exclamation-circle text-warning"></i> Required'):'Not required'}</div></div>
      <div class="col-4"><div class="text-muted">Last Verified</div><div>${p.last_verified_date?fmtDate(p.last_verified_date):'<span class="text-muted">Never</span>'}</div></div>
    </div>
    ${p.agent_name?`<div class="mt-2 pt-2 border-top d-flex justify-content-between align-items-center">
      <div style="font-size:.8rem"><i class="bi bi-person-badge text-muted me-1"></i><strong>${p.agent_name}</strong> – ${p.agency_name} <a href="mailto:${p.agent_email}">${p.agent_email}</a></div>
      ${AUTH.user.role==='admin'?`<div class="d-flex gap-1">
        <button class="btn btn-sm btn-outline-success py-0 px-2" onclick="verifyPolicy(${p.id},${sub.id})" style="font-size:.7rem"><i class="bi bi-check2"></i> Verify</button>
        <button class="btn btn-sm btn-outline-warning py-0 px-2" onclick="openEmailForPolicyId(${p.id})" style="font-size:.7rem"><i class="bi bi-envelope"></i></button>
        <button class="btn btn-sm btn-outline-secondary py-0 px-2" onclick="openEditPolicy(${p.id},${sub.id})" style="font-size:.7rem"><i class="bi bi-pencil"></i></button>
      </div>`:''}
    </div>`:AUTH.user.role==='admin'?`<div class="mt-2 pt-2 border-top d-flex gap-1">
      <button class="btn btn-sm btn-outline-success py-0 px-2" onclick="verifyPolicy(${p.id},${sub.id})" style="font-size:.7rem"><i class="bi bi-check2"></i> Verify</button>

function savePolicy(policyId, subId) {
  const data = { sub_id:subId, policy_type:document.getElementById('pf_type').value, status:document.getElementById('pf_status').value, agent_id:parseInt(document.getElementById('pf_agent').value)||null, policy_number:document.getElementById('pf_num').value.trim(), carrier:document.getElementById('pf_carrier').value.trim(), coverage_amount:parseFloat(document.getElementById('pf_amount').value)||null, effective_date:document.getElementById('pf_eff').value, expiration_date:document.getElementById('pf_exp').value, certificate_on_file:document.getElementById('pf_cert').checked, requires_additional_insured:document.getElementById('pf_addlreq').checked, additional_insured_confirmed:document.getElementById('pf_addlconf').checked, is_ghost_policy:document.getElementById('pf_ghost').checked, notes:document.getElementById('pf_notes').value.trim() };
  if (policyId) DB.update('policies', policyId, data); else DB.insert('policies', data);
  bootstrap.Modal.getInstance(document.getElementById('policyModal')).hide();
  openSubDetail(subId);
}

function verifyPolicy(policyId, subId) {
  DB.update('policies', policyId, { last_verified_date: new Date().toISOString().split('T')[0] });
  openSubDetail(subId||_currentSubId);
}

function openEmailForPolicyId(policyId) {
  const p = _policyCache[policyId] || DB.one('policies', x=>x.id===policyId);
  if (!p) { alert('Policy not found'); return; }
  const agent = p.agent_id ? DB.one('agents', a=>a.id===p.agent_id) : null;
  const sub = DB.one('subs', s=>s.id===p.sub_id);
  const days = daysUntil(p.expiration_date);
  const subject = `ACTION REQUIRED: Insurance Expiring in ${days} Days – ${sub?.company_name||''}`;
  const body = `Dear ${agent?.name||'Agent'},\n\nThis is a reminder that the ${p.policy_type==='general_liability'?'General Liability':"Workers' Comp"} policy for ${sub?.company_name||''} (Policy #${p.policy_number||'N/A'}) expires on ${fmtDate(p.expiration_date)}.\n\nPlease provide a renewed certificate at your earliest convenience.\n\nSend to: compliance@insuretrack.com\n\nThank you,\n${AUTH.user.name}\nInsureTrack`;
  showEmailModal({ to_email:agent?.email||'', to_name:agent?.name||'', subject, body, sub_id:p.sub_id, policy_id:p.id, template_type:'expiration_warning' });
}

    <div class="col-12"><label class="form-label">Agent Name *</label><input class="form-control" id="af_name" value="${a.name||''}"></div>
    <div class="col-12"><label class="form-label">Agency Name</label><input class="form-control" id="af_agency" value="${a.agency_name||''}"></div>
    <div class="col-md-6"><label class="form-label">Email *</label><input type="email" class="form-control" id="af_email" value="${a.email||''}"></div>
    <div class="col-md-6"><label class="form-label">Phone</label><input class="form-control" id="af_phone" value="${a.phone||''}"></div>
  </div>`;
}
function saveAgent() {
  const editId = parseInt(document.getElementById('agentFormBody').dataset.editId||'0')||null;
  const data = { name:document.getElementById('af_name').value.trim(), email:document.getElementById('af_email').value.trim(), phone:document.getElementById('af_phone').value.trim(), agency_name:document.getElementById('af_agency').value.trim() };
  if (!data.name||!data.email) { alert('Name and email required'); return; }
  if (editId) DB.update('agents',editId,data); else DB.insert('agents',data);
  bootstrap.Modal.getInstance(document.getElementById('agentFormModal')).hide();
  renderAgents();
}

// ==================== EMAIL ====================
function openEmailComposer(subId) {
  const sub = DB.one('subs', s=>s.id===subId);
  if (!sub) return;
  const policies = DB.find('policies', p=>p.sub_id===subId);
  const gl = policies.find(p=>p.policy_type==='general_liability');
  const agent = gl?.agent_id ? DB.one('agents',a=>a.id===gl.agent_id) : null;
  const gc = DB.find('gc_subs',l=>l.sub_id===subId&&l.is_active).map(l=>DB.one('gcs',g=>g.id===l.gc_id)).filter(Boolean)[0];
  const templates = DB.all('templates');
  const tmpl = templates.find(t=>t.template_type==='certificate_request');
  let body = tmpl ? tmpl.body : '';
  if (body) {
    const wc = policies.find(p=>p.policy_type==='workers_comp');
    body = body.replace(/\{\{sub_name\}\}/g,sub.company_name).replace(/\{\{agent_name\}\}/g,agent?.name||'Agent').replace(/\{\{gc_name\}\}/g,gc?.company_name||'GC').replace(/\{\{gl_policy_number\}\}/g,gl?.policy_number||'N/A').replace(/\{\{wc_policy_number\}\}/g,wc?.policy_number||'N/A').replace(/\{\{admin_name\}\}/g,AUTH.user.name).replace(/\{\{admin_email\}\}/g,AUTH.user.email||'compliance@insuretrack.com');
  }
  showEmailModal({ to_email:agent?.email||'', to_name:agent?.name||'', subject:(tmpl?.subject||'').replace('{{sub_name}}',sub.company_name), body, sub_id:subId, template_type:'certificate_request' });
}

function showEmailModal(ctx) {
  const templates = DB.all('templates');
  document.getElementById('emailModalBody').innerHTML = `
    <div class="mb-3"><label class="form-label">Use Template</label><select class="form-select" id="em_tmpl" onchange="applyTemplate(this.value,${ctx.sub_id||'null'})"><option value="">— Custom —</option>${templates.map(t=>`<option value="${t.id}">${t.name}</option>`).join('')}</select></div>
    <div class="mb-3"><label class="form-label">To (Email) *</label><input type="email" class="form-control" id="em_to" value="${ctx.to_email||''}"></div>
    <div class="mb-3"><label class="form-label">To (Name)</label><input class="form-control" id="em_toname" value="${ctx.to_name||''}"></div>
    <div class="mb-3"><label class="form-label">Subject *</label><input class="form-control" id="em_subj" value="${(ctx.subject||'').replace(/"/g,'&quot;')}"></div>
    <div class="mb-3"><label class="form-label">Message *</label><textarea class="form-control" id="em_body" rows="10" style="font-family:monospace;font-size:.85rem">${ctx.body||''}</textarea></div>
    <input type="hidden" id="em_subid" value="${ctx.sub_id||''}">
    <input type="hidden" id="em_polid" value="${ctx.policy_id||''}">
    <input type="hidden" id="em_type" value="${ctx.template_type||'custom'}">
    <div class="alert alert-info mb-0" style="font-size:.8rem"><i class="bi bi-info-circle me-1"></i>Emails are logged for compliance tracking. Configure SMTP in production to send real emails.</div>`;
  new bootstrap.Modal(document.getElementById('emailModal')).show();
}

function applyTemplate(tmplId, subId) {
  if (!tmplId) return;
  const tmpl = DB.one('templates', t=>t.id===parseInt(tmplId));
  if (!tmpl) return;
  let body = tmpl.body, subj = tmpl.subject;
  if (subId) {
    const sub = DB.one('subs',s=>s.id===subId);
    const policies = DB.find('policies',p=>p.sub_id===subId);
    const gl = policies.find(p=>p.policy_type==='general_liability');
    const wc = policies.find(p=>p.policy_type==='workers_comp');
    const agent = gl?.agent_id?DB.one('agents',a=>a.id===gl.agent_id):null;
    const gc = DB.find('gc_subs',l=>l.sub_id===subId&&l.is_active).map(l=>DB.one('gcs',g=>g.id===l.gc_id)).filter(Boolean)[0];
    const vars = {sub_name:sub?.company_name||'',agent_name:agent?.name||'Agent',gc_name:gc?.company_name||'GC',gl_policy_number:gl?.policy_number||'N/A',wc_policy_number:wc?.policy_number||'N/A',admin_name:AUTH.user.name,admin_email:AUTH.user.email||'compliance@insuretrack.com'};
    Object.entries(vars).forEach(([k,v])=>{ body=body.replace(new RegExp('\\{\\{'+k+'\\}\\}','g'),v); subj=subj.replace(new RegExp('\\{\\{'+k+'\\}\\}','g'),v); });
  }
  document.getElementById('em_subj').value = subj;
  document.getElementById('em_body').value = body;
}

function sendEmail() {
  const to_email = document.getElementById('em_to').value.trim();
  const subject = document.getElementById('em_subj').value.trim();
  const body = document.getElementById('em_body').value.trim();
  if (!to_email||!subject||!body) { alert('To, Subject, and Body are required'); return; }
  DB.insert('email_log', { to_email, to_name:document.getElementById('em_toname').value.trim(), template_type:document.getElementById('em_type').value, subject, body, sent_by_id:AUTH.user.id, sent_by_name:AUTH.user.name, sub_id:parseInt(document.getElementById('em_subid').value)||null, policy_id:parseInt(document.getElementById('em_polid').value)||null, status:'sent' });
  bootstrap.Modal.getInstance(document.getElementById('emailModal')).hide();
  alert('✓ Email logged successfully!\n\nIn production, configure SMTP settings to send real emails.');
  if (currentPage==='emails') renderEmails();
}

function renderEmails() {
  const emails = DB.all('email_log').reverse();
  document.getElementById('content-area').innerHTML = `<div class="card-it">
    <div class="card-it-header"><h6><i class="bi bi-envelope me-2"></i>Email Activity Log (${emails.length})</h6><button class="btn btn-sm btn-primary" onclick="showEmailModal({})"><i class="bi bi-plus-lg me-1"></i>Compose</button></div>
    ${emails.length===0?'<div class="empty-state"><i class="bi bi-envelope"></i>No emails sent yet</div>':`
    <table class="table table-hover mb-0"><thead><tr><th>Date</th><th>To</th><th>Type</th><th>Subject</th><th>Sent By</th><th></th></tr></thead>
    <tbody>${emails.map(e=>`<tr>
      <td style="font-size:.8rem;white-space:nowrap">${fmtDT(e.created_at)}</td>
      <td><strong>${e.to_name||''}</strong><br><small class="text-muted">${e.to_email}</small></td>
      <td><span class="badge bg-secondary" style="font-size:.7rem">${(e.template_type||'custom').replace(/_/g,' ')}</span></td>
      <td style="font-size:.85rem">${e.subject}</td>
      <td style="font-size:.8rem">${e.sent_by_name||'—'}</td>
      <td><button class="btn btn-sm btn-outline-secondary py-0 px-2" onclick="previewEmail(${e.id})"><i class="bi bi-eye"></i></button></td>
    </tr>`).join('')}</tbody></table>`}
  </div>`;
}

function previewEmail(id) {
  const e = DB.one('email_log', x=>x.id===id);
  if (!e) return;
  const w = window.open('','_blank','width=700,height=600');
  w.document.write(`<!DOCTYPE html><html><head><title>Email Preview</title></head><body style="font-family:sans-serif;padding:20px;max-width:600px"><div style="background:#f5f5f5;padding:15px;border-radius:8px;margin-bottom:15px"><strong>To:</strong> ${e.to_name||''} &lt;${e.to_email}&gt;<br><strong>Subject:</strong> ${e.subject}<br><strong>Sent:</strong> ${fmtDT(e.created_at)}</div><pre style="white-space:pre-wrap;font-family:inherit;font-size:14px">${e.body}</pre></body></html>`);
}

// ==================== TEMPLATES ====================
function renderTemplates() {
  const templates = DB.all('templates');
  document.getElementById('content-area').innerHTML = `<div class="card-it">
    <div class="card-it-header"><h6><i class="bi bi-file-text me-2"></i>Email Templates</h6></div>
    <div class="p-3"><div class="accordion" id="tmplAcc">${templates.map((t,i)=>`
      <div class="accordion-item mb-2 border rounded">
        <h2 class="accordion-header"><button class="accordion-button ${i>0?'collapsed':''}" type="button" data-bs-toggle="collapse" data-bs-target="#tb${t.id}">
          <span class="badge bg-primary me-2" style="font-size:.7rem">${t.template_type.replace(/_/g,' ')}</span>${t.name}
        </button></h2>
        <div id="tb${t.id}" class="accordion-collapse collapse ${i===0?'show':''}">
          <div class="accordion-body">
            <div class="mb-2"><label class="form-label">Subject</label><input class="form-control" id="ts_subj_${t.id}" value="${t.subject.replace(/"/g,'&quot;')}"></div>
            <div class="mb-3"><label class="form-label">Body <small class="text-muted">(vars: {{sub_name}}, {{agent_name}}, {{gc_name}}, {{admin_name}}, {{gl_policy_number}}, {{wc_policy_number}})</small></label><textarea class="form-control" id="ts_body_${t.id}" rows="12" style="font-family:monospace;font-size:.8rem">${t.body}</textarea></div>
            <button class="btn btn-sm btn-primary" onclick="saveTmpl(${t.id})"><i class="bi bi-save me-1"></i>Save Changes</button>
          </div>
        </div>
      </div>`).join('')}
    </div></div>
  </div>`;
}
function saveTmpl(id) {
  DB.update('templates', id, { subject:document.getElementById(`ts_subj_${id}`).value, body:document.getElementById(`ts_body_${id}`).value });
  alert('✓ Template saved');
}

// ==================== REPORTS ====================
function renderReports() {
  const subs = DB.all('subs').map(s => {
    const policies = DB.find('policies', p=>p.sub_id===s.id);
    const gl = policies.find(p=>p.policy_type==='general_liability');
    const wc = policies.find(p=>p.policy_type==='workers_comp');
    const gcs = DB.find('gc_subs',l=>l.sub_id===s.id&&l.is_active).map(l=>DB.one('gcs',g=>g.id===l.gc_id)).filter(Boolean);
    return { ...s, computed_status:computeStatus(s.id), gl, wc, general_contractors:gcs };
  });
  const counts = {active:0,expiring_soon:0,non_compliant:0,pending:0};
  subs.forEach(s => counts[s.computed_status]=(counts[s.computed_status]||0)+1);
  document.getElementById('content-area').innerHTML = `
    <div class="row g-3 mb-4">
      <div class="col-md-3"><div class="stat-card text-center"><div class="stat-num" style="color:#166534">${counts.active}</div><div class="stat-label">Compliant</div></div></div>
      <div class="col-md-3"><div class="stat-card text-center"><div class="stat-num" style="color:#92400e">${counts.expiring_soon}</div><div class="stat-label">Expiring Soon</div></div></div>
      <div class="col-md-3"><div class="stat-card text-center"><div class="stat-num" style="color:#991b1b">${counts.non_compliant}</div><div class="stat-label">Non-Compliant</div></div></div>
      <div class="col-md-3"><div class="stat-card text-center"><div class="stat-num" style="color:#475569">${counts.pending}</div><div class="stat-label">Pending</div></div></div>
    </div>
    <div class="card-it">
      <div class="card-it-header"><h6><i class="bi bi-bar-chart me-2"></i>Full Compliance Report</h6><button class="btn btn-sm btn-outline-secondary" onclick="exportCSV()"><i class="bi bi-download me-1"></i>Export CSV</button></div>
      <div class="table-responsive"><table class="table table-hover mb-0" id="reportTable">
        <thead><tr><th>Subcontractor</th><th>Trade</th><th>GC(s)</th><th>Status</th><th>W9</th><th>GL Policy</th><th>GL Expires</th><th>WC Policy</th><th>WC Expires</th><th>Addl. Insured</th></tr></thead>
        <tbody>${subs.map(s=>`<tr class="sub-row" onclick="openSubDetail(${s.id})">
          <td><strong>${s.company_name}</strong><br><small class="text-muted">${s.contact_name}</small></td>
          <td>${s.trade||'—'}</td>
          <td style="font-size:.75rem">${s.general_contractors.map(g=>g.company_name).join(', ')||'—'}</td>
          <td>${statusBadge(s.computed_status)}</td>
          <td class="text-center">${s.w9_on_file?`<span class="badge-active">${s.w9_year}</span>`:'<span class="badge-noncompliant">Missing</span>'}</td>
          <td style="font-size:.8rem">${s.gl?s.gl.policy_number||'On file':'<span class="text-danger">Missing</span>'}</td>
          <td>${s.gl?expCell(s.gl):'—'}</td>
          <td style="font-size:.8rem">${s.wc?s.wc.policy_number||'On file':s.is_sole_proprietor?'<span class="text-muted">Sole Prop</span>':'<span class="text-danger">Missing</span>'}</td>
          <td>${s.wc?expCell(s.wc):'—'}</td>
          <td class="text-center">${s.gl?.requires_additional_insured?(s.gl.additional_insured_confirmed?'<i class="bi bi-check-circle text-success"></i>':'<i class="bi bi-exclamation-circle text-warning"></i>'):'—'}</td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>`;
}
function expCell(p) { const d=daysUntil(p.expiration_date); if(!p.expiration_date)return'—'; if(d<0)return`<span class="badge-noncompliant">${fmtDate(p.expiration_date)}</span>`; if(d<=30)return`<span class="badge-expiring">${fmtDate(p.expiration_date)} (${d}d)</span>`; return`<span style="font-size:.8rem">${fmtDate(p.expiration_date)}</span>`; }
function exportCSV() {
  const t = document.getElementById('reportTable'); if(!t)return;
  let csv=''; t.querySelectorAll('tr').forEach(r=>{ csv+=Array.from(r.querySelectorAll('th,td')).map(c=>'"'+c.innerText.replace(/"/g,'""').replace(/\n/g,' ')+'"').join(',')+'\n'; });
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download=`insuretrack_compliance_${new Date().toISOString().split('T')[0]}.csv`; a.click();
}

// ==================== NOTIFICATIONS ====================
function refreshNotifBadge() {
  const uid = AUTH.user?.id;
  const count = DB.find('notifications', n=>n.user_id===uid&&!n.is_read).length;
  const b=document.getElementById('notif-badge'); const sb=document.getElementById('notif-sidebar-badge');
  if(count>0){ if(b){b.textContent=count;b.style.display='';} if(sb){sb.textContent=count;sb.classList.remove('d-none');} }
  else { if(b)b.style.display='none'; if(sb)sb.classList.add('d-none'); }
}
function renderNotifications() {
  const uid = AUTH.user?.id;
  const notifs = DB.find('notifications', n=>n.user_id===uid).reverse();
  const unread = notifs.filter(n=>!n.is_read).length;
  document.getElementById('content-area').innerHTML = `<div class="card-it">
    <div class="card-it-header"><h6><i class="bi bi-bell me-2"></i>Notifications (${unread} unread)</h6><button class="btn btn-sm btn-outline-secondary" onclick="markAllRead()">Mark All Read</button></div>
    <div>${notifs.length===0?'<div class="empty-state"><i class="bi bi-bell-slash"></i>No notifications</div>':notifs.map(n=>`
      <div class="d-flex align-items-start gap-3 p-3 border-bottom ${n.is_read?'':'bg-light'}" id="notif-${n.id}">
        <div class="mt-1">${notifIcon(n.type)}</div>
        <div class="flex-fill">
          <div class="fw-bold" style="font-size:.875rem">${n.title}</div>
          <div class="text-muted" style="font-size:.8rem">${n.message}</div>
          <div style="font-size:.72rem;color:#94a3b8">${fmtDT(n.created_at)}</div>
        </div>
        ${!n.is_read?`<button class="btn btn-sm btn-outline-secondary py-0 px-2" onclick="markRead(${n.id})" style="font-size:.7rem;white-space:nowrap">Mark read</button>`:''}
      </div>`).join('')}
    </div>
  </div>`;
}
function notifIcon(t) { return {expiration_warning:'<i class="bi bi-exclamation-triangle text-warning fs-5"></i>',non_compliant:'<i class="bi bi-x-circle text-danger fs-5"></i>',pending_w9:'<i class="bi bi-file-earmark text-secondary fs-5"></i>',email_sent:'<i class="bi bi-envelope text-primary fs-5"></i>'}[t]||'<i class="bi bi-bell text-muted fs-5"></i>'; }
function markRead(id) { DB.update('notifications',id,{is_read:true}); document.getElementById('notif-'+id)?.classList.remove('bg-light'); refreshNotifBadge(); }
function markAllRead() { const uid=AUTH.user?.id; DB.find('notifications',n=>n.user_id===uid&&!n.is_read).forEach(n=>DB.update('notifications',n.id,{is_read:true})); renderNotifications(); refreshNotifBadge(); }
function checkExpirations() {
  const today = new Date().toISOString().split('T')[0];
  const future = new Date(); future.setDate(future.getDate()+30); const fut=future.toISOString().split('T')[0];
  let created=0;
  DB.all('policies').forEach(p => {
    const d=daysUntil(p.expiration_date);
    if (d!==null&&d<0) DB.update('policies',p.id,{status:'expired'});
    if (d!==null&&d<=30&&d>=0) {
      const sub=DB.one('subs',s=>s.id===p.sub_id);
      const exists=DB.one('notifications',n=>n.related_id===p.id&&n.type==='expiration_warning'&&!n.is_read);
      if (!exists&&sub) { DB.insert('notifications',{user_id:1,type:'expiration_warning',title:'Policy Expiring Soon',message:`${sub.company_name} – ${p.policy_type==='general_liability'?'General Liability':"Workers' Comp"} expires in ${d} days`,related_type:'policy',related_id:p.id,is_read:false}); created++; }
    }
  });
  refreshNotifBadge();
  alert(`Checked ${DB.all('policies').length} policies. ${created} new notification(s) created.`);
  renderDashboard();
}

// ==================== INIT ====================
seedIfNeeded();
const sess = sessionStorage.getItem('it_session');
if (sess) { try { AUTH.user={...JSON.parse(sess)}; startApp(); } catch(e) { sessionStorage.removeItem('it_session'); } }
</script>
